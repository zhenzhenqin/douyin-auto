<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音火花群发助手</title>
<style>
/* ============================================
   CYBER CAMPFIRE — 赛博篝火营地
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #080A11;
    --fire-orange: #FE2C55;
    --fire-gold: #FF9A3C;
    --cyber-cyan: #25F4EE;
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --text-primary: #e8e8e8;
    --text-secondary: #666;
    --text-dim: #444;
}

html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
}

/* ── 背景星空粒子 ── */
.starfield {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.15), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1.5px 1.5px at 15% 85%, rgba(37,244,238,0.3), transparent),
        radial-gradient(1.5px 1.5px at 85% 15%, rgba(254,44,85,0.3), transparent),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px 1px at 65% 35%, rgba(255,255,255,0.12), transparent),
        radial-gradient(1px 1px at 25% 75%, rgba(255,255,255,0.2), transparent);
}

/* ── 地面光晕 ── */
.ground-glow {
    position: fixed;
    bottom: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(254,44,85,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
}

/* ── 主舞台 ── */
.stage {
    position: relative;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
}

/* ══════════════════════════════════════
   篝火 (Campfire)
   ══════════════════════════════════════ */
.campfire-container {
    position: relative;
    width: 160px; height: 180px;
    margin-bottom: 20px;
}

/* 篝火底座 */
.campfire-base {
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 80px; height: 12px;
    background: linear-gradient(90deg, transparent, rgba(255,154,60,0.3), transparent);
    border-radius: 50%;
    filter: blur(4px);
}

/* 火焰主体 */
.flame-group {
    position: absolute;
    bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 100px;
}

.flame {
    position: absolute;
    bottom: 0; left: 50%;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    transform-origin: center bottom;
    filter: blur(1px);
}

.flame-core {
    width: 24px; height: 55px;
    transform: translateX(-50%);
    background: linear-gradient(0deg, #FE2C55 0%, #FF9A3C 40%, #FFD700 80%, rgba(255,255,255,0.9) 100%);
    animation: flameCore 0.8s ease-in-out infinite alternate;
    z-index: 3;
}

.flame-mid {
    width: 36px; height: 70px;
    transform: translateX(-50%) scaleX(0.9);
    background: linear-gradient(0deg, #FE2C55 0%, #FF6B35 50%, #FF9A3C 100%);
    opacity: 0.7;
    animation: flameMid 1.1s ease-in-out infinite alternate;
    z-index: 2;
}

.flame-outer {
    width: 50px; height: 85px;
    transform: translateX(-50%);
    background: linear-gradient(0deg, rgba(254,44,85,0.6) 0%, rgba(255,107,53,0.3) 50%, transparent 100%);
    opacity: 0.5;
    animation: flameOuter 1.4s ease-in-out infinite alternate;
    z-index: 1;
}

/* 火焰内部粒子 */
.flame-particles {
    position: absolute;
    bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 80px;
    z-index: 4;
}

.spark {
    position: absolute;
    width: 3px; height: 3px;
    background: #FFD700;
    border-radius: 50%;
    animation: sparkFloat 2s ease-out infinite;
    box-shadow: 0 0 6px 2px rgba(255,215,0,0.6);
}
.spark:nth-child(1) { left: 30%; animation-delay: 0s; animation-duration: 1.8s; }
.spark:nth-child(2) { left: 55%; animation-delay: 0.6s; animation-duration: 2.2s; }
.spark:nth-child(3) { left: 70%; animation-delay: 1.2s; animation-duration: 1.6s; }
.spark:nth-child(4) { left: 40%; animation-delay: 0.3s; animation-duration: 2.5s; }
.spark:nth-child(5) { left: 60%; animation-delay: 0.9s; animation-duration: 2s; }

/* 篝火地面光圈 */
.fire-ring {
    position: absolute;
    bottom: -20px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 40px;
    background: radial-gradient(ellipse, rgba(254,44,85,0.25) 0%, rgba(255,154,60,0.1) 40%, transparent 70%);
    border-radius: 50%;
    animation: ringPulse 3s ease-in-out infinite;
}

/* ══════════════════════════════════════
   好友轨道 (Friend Orbit)
   ══════════════════════════════════════ */
.orbit-container {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 480px; height: 480px;
    pointer-events: none;
}

.orbit-ring {
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 50%;
    animation: orbitSpin 60s linear infinite;
}

.orbit-ring::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    border: 1px dashed rgba(37,244,238,0.06);
    animation: orbitSpin 90s linear infinite reverse;
}

/* 好友火种卡片 */
.orbit-item {
    position: absolute;
    pointer-events: auto;
    cursor: default;
}

.fireseed {
    position: relative;
    width: 80px; height: 80px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.fireseed:hover { transform: scale(1.15); }

/* 火种光环 */
.fireseed-glow {
    position: absolute;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(254,44,85,0.2) 0%, transparent 70%);
    animation: seedGlow 3s ease-in-out infinite;
    transition: all 0.3s ease;
}
.fireseed:hover .fireseed-glow {
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(254,44,85,0.35) 0%, rgba(37,244,238,0.1) 70%);
}

/* 火种头像 */
.fireseed-avatar {
    position: relative;
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff;
    background: linear-gradient(135deg, var(--fire-orange), var(--fire-gold));
    border: 2px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 16px rgba(254,44,85,0.3);
    transition: all 0.3s ease;
    z-index: 2;
}
.fireseed:hover .fireseed-avatar {
    border-color: var(--cyber-cyan);
    box-shadow: 0 0 24px rgba(37,244,238,0.4);
}

/* 火种名字 */
.fireseed-name {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    max-width: 80px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    transition: color 0.3s ease;
}
.fireseed:hover .fireseed-name { color: #fff; }

/* 删除按钮 — 悬浮显示 */
.fireseed-delete {
    position: absolute;
    top: -4px; right: -4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(255,77,79,0.9);
    border: 2px solid var(--bg);
    color: #fff;
    font-size: 11px;
    line-height: 16px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 10;
}
.fireseed:hover .fireseed-delete {
    opacity: 1;
    transform: scale(1);
}
.fireseed-delete:hover {
    background: #ff1a1a;
    transform: scale(1.2) !important;
}

/* 空状态 */
.orbit-empty {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    pointer-events: none;
    letter-spacing: 2px;
}
.orbit-empty span { display: block; margin-top: 4px; font-size: 24px; opacity: 0.3; }

/* ══════════════════════════════════════
   烟雾日志 (Smoke Logs)
   ══════════════════════════════════════ */
.smoke-zone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -100%);
    width: 300px; height: 260px;
    pointer-events: none;
    overflow: hidden;
    mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
}

.smoke-line {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    color: rgba(74, 222, 128, 0.8);
    white-space: nowrap;
    text-align: center;
    animation: smokeRise 5s ease-out forwards;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(74, 222, 128, 0.3);
    width: max-content;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ══════════════════════════════════════
   底部指令栏 (Command Bar)
   ══════════════════════════════════════ */
.command-dock {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    z-index: 100;
}

/* 主输入框 — Spotlight 风格 */
.command-input-wrap {
    position: relative;
    width: 360px;
}

.command-input {
    width: 100%;
    padding: 14px 20px 14px 44px;
    background: rgba(15, 17, 28, 0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
}
.command-input::placeholder { color: #444; }
.command-input:focus {
    border-color: rgba(37, 244, 238, 0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 3px rgba(37,244,238,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
}

.command-icon {
    position: absolute;
    left: 16px; top: 50%; transform: translateY(-50%);
    color: #555;
    font-size: 16px;
    pointer-events: none;
    transition: color 0.3s ease;
}
.command-input:focus ~ .command-icon { color: var(--cyber-cyan); }

/* 全息微章 (Holographic Micro-badges) */
.holo-badge {
    position: relative;
    width: 44px; height: 44px;
    border-radius: 14px;
    background: rgba(15, 17, 28, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    overflow: visible;
}

.holo-badge svg {
    width: 20px; height: 20px;
    fill: none;
    stroke: #777;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.3s ease;
}

.holo-badge:hover {
    transform: translateY(-4px) scale(1.05);
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.holo-badge:hover svg { stroke: #fff; }

/* 每个徽章独特的 hover 色 */
.holo-badge.badge-login:hover {
    border-color: rgba(37,244,238,0.4);
    box-shadow: 0 0 20px rgba(37,244,238,0.15);
}
.holo-badge.badge-login:hover svg { stroke: var(--cyber-cyan); }

.holo-badge.badge-run:hover {
    border-color: rgba(250,173,20,0.4);
    box-shadow: 0 0 20px rgba(250,173,20,0.15);
}
.holo-badge.badge-run:hover svg { stroke: var(--fire-gold); }

.holo-badge.badge-schedule:hover {
    border-color: rgba(82,196,26,0.4);
    box-shadow: 0 0 20px rgba(82,196,26,0.15);
}
.holo-badge.badge-schedule:hover svg { stroke: #52c41a; }

.holo-badge.badge-refresh:hover {
    border-color: rgba(114,46,209,0.4);
    box-shadow: 0 0 20px rgba(114,46,209,0.15);
}
.holo-badge.badge-refresh:hover svg { stroke: #b37feb; }

.holo-badge.badge-save:hover {
    border-color: rgba(254,44,85,0.4);
    box-shadow: 0 0 20px rgba(254,44,85,0.15);
}
.holo-badge.badge-save:hover svg { stroke: var(--fire-orange); }

/* 徽章悬浮提示 */
.holo-tooltip {
    position: absolute;
    bottom: calc(100% + 10px); left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: rgba(15, 17, 28, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    color: #ccc;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: all 0.25s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.holo-tooltip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(15, 17, 28, 0.95);
}
.holo-badge:hover .holo-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* 时间选择器 */
.time-badge {
    position: relative;
    height: 44px;
    padding: 0 14px;
    border-radius: 14px;
    background: rgba(15, 17, 28, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    color-scheme: dark;
}
.time-badge input[type="time"] {
    background: transparent; border: none; outline: none;
    color: #aaa; font-size: 13px; font-family: inherit; width: 60px; cursor: pointer;
}
.time-badge svg {
    width: 16px; height: 16px; fill: none; stroke: #666;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}

/* ══════════════════════════════════════
   好友计数浮标
   ══════════════════════════════════════ */
.count-float {
    position: fixed;
    top: 28px; right: 32px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(15, 17, 28, 0.7);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    font-size: 13px;
    color: #888;
    z-index: 50;
}
.count-num {
    background: linear-gradient(135deg, var(--fire-orange), var(--cyber-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600; font-size: 15px;
}

/* ══════════════════════════════════════
   状态指示 (Status indicator)
   ══════════════════════════════════════ */
.status-dot {
    position: fixed;
    top: 32px; left: 32px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #555;
    z-index: 50;
}
.status-dot::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #52c41a;
    box-shadow: 0 0 8px rgba(82,196,26,0.5);
    animation: statusPulse 2s ease-in-out infinite;
}

/* ══════════════════════════════════════
   KEYFRAMES
   ══════════════════════════════════════ */

@keyframes flameCore {
    0%   { height: 55px; opacity: 1; }
    50%  { height: 48px; opacity: 0.9; }
    100% { height: 58px; opacity: 1; }
}
@keyframes flameMid {
    0%   { height: 70px; transform: translateX(-50%) scaleX(0.9) rotate(-2deg); }
    50%  { height: 62px; transform: translateX(-50%) scaleX(0.95) rotate(1deg); }
    100% { height: 72px; transform: translateX(-50%) scaleX(0.88) rotate(-1deg); }
}
@keyframes flameOuter {
    0%   { height: 85px; opacity: 0.5; }
    50%  { height: 75px; opacity: 0.35; }
    100% { height: 88px; opacity: 0.45; }
}

@keyframes sparkFloat {
    0%   { bottom: 0; opacity: 1; transform: translateX(0) scale(1); }
    50%  { opacity: 0.8; }
    100% { bottom: 70px; opacity: 0; transform: translateX(10px) scale(0.3); }
}

@keyframes ringPulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    50%      { opacity: 1;   transform: translateX(-50%) scaleX(1.05); }
}

@keyframes orbitSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

@keyframes seedGlow {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 0.7; transform: scale(1.1); }
}

@keyframes smokeRise {
    0%   { bottom: 0; opacity: 0; transform: translateX(-50%) translateY(0); }
    10%  { opacity: 0.8; }
    70%  { opacity: 0.4; }
    100% { bottom: 100%; opacity: 0; transform: translateX(-50%) translateY(-20px); }
}

@keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── 响应式 ── */
@media (max-width: 560px) {
    .command-input-wrap { width: 260px; }
    .orbit-container { width: 360px; height: 360px; }
    .fireseed-avatar { width: 36px; height: 36px; font-size: 13px; }
    .fireseed-name { font-size: 10px; }
    .campfire-container { transform: scale(0.8); }
    .time-badge { display: none; }
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="starfield"></div>
<div class="ground-glow"></div>

<!-- 状态指示 -->
<div class="status-dot">在线</div>

<!-- 好友计数 -->
<div class="count-float">
    火种 <span class="count-num" id="count">0</span>
</div>

<!-- 主舞台 -->
<div class="stage">

    <!-- 烟雾日志区 -->
    <div class="smoke-zone" id="smokeZone"></div>

    <!-- 篝火 -->
    <div class="campfire-container">
        <div class="flame-group">
            <div class="flame flame-outer"></div>
            <div class="flame flame-mid"></div>
            <div class="flame flame-core"></div>
            <div class="flame-particles">
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
                <div class="spark"></div>
            </div>
        </div>
        <div class="fire-ring"></div>
        <div class="campfire-base"></div>
    </div>

    <!-- 好友轨道 -->
    <div class="orbit-container" id="orbitContainer">
        <div class="orbit-ring"></div>
        <div class="orbit-empty" id="orbitEmpty">
            在下方输入昵称，回车添加火种
            <span>✦</span>
        </div>
    </div>
</div>

<!-- 底部指令栏 -->
<div class="command-dock">
    <!-- 扫码登录 -->
    <div class="holo-badge badge-login" onclick="runLogin()">
        <svg viewBox="0 0 24 24"><path d="M4 4h4V2H2v6h2V4zm16 0V2h-6v2h4v4h2V4zM4 20v-4H2v6h6v-2H4zm16-4v4h-4v2h6v-6h-2z"/><rect x="7" y="7" width="3" height="3"/><rect x="14" y="7" width="3" height="3"/><rect x="7" y="14" width="3" height="3"/><path d="M17 14h-1v3h-3v1h4v-4z"/></svg>
        <div class="holo-tooltip">扫码登录</div>
    </div>

    <!-- 时间 -->
    <div class="time-badge">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <input type="time" id="scheduleTime" value="08:00">
    </div>

    <!-- 指令输入 -->
    <div class="command-input-wrap">
        <input type="text" class="command-input" id="cmdInput" placeholder="输入好友昵称，回车添加..." autocomplete="off" spellcheck="false">
        <div class="command-icon">⌘</div>
    </div>

    <!-- 立即执行 -->
    <div class="holo-badge badge-run" onclick="runNow()">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <div class="holo-tooltip">立即群发</div>
    </div>

    <!-- 保存配置 -->
    <div class="holo-badge badge-save" onclick="saveConfig()">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <div class="holo-tooltip">保存配置</div>
    </div>

    <!-- 更新定时 -->
    <div class="holo-badge badge-schedule" onclick="setSchedule()">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="8 14 10 16 14 12"/></svg>
        <div class="holo-tooltip">更新系统定时任务</div>
    </div>

    <!-- 刷新凭证 -->
    <div class="holo-badge badge-refresh" onclick="refreshSession()">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <div class="holo-tooltip">手动刷新登录凭证</div>
    </div>
</div>

<script>
/* ============================================
   逻辑层 — 好友数据 & API 调用
   ============================================ */

let friends = [];
const orbitContainer = document.getElementById('orbitContainer');
const orbitEmpty = document.getElementById('orbitEmpty');
const smokeZone = document.getElementById('smokeZone');
const cmdInput = document.getElementById('cmdInput');

// ── 烟雾日志 ──
function log(msg) {
    const line = document.createElement('div');
    line.className = 'smoke-line';
    const time = new Date().toLocaleTimeString();
    line.textContent = `[${time}] ${msg}`;
    smokeZone.appendChild(line);
    // 动画结束后移除
    line.addEventListener('animationend', () => line.remove());
    // 保底清理：最多同时 8 条
    const lines = smokeZone.querySelectorAll('.smoke-line');
    if (lines.length > 8) lines[0].remove();
}

// ── 好友轨道渲染 ──
function renderOrbit() {
    // 清除旧的火种卡片（保留 orbit-ring 和 orbit-empty）
    orbitContainer.querySelectorAll('.orbit-item').forEach(el => el.remove());

    document.getElementById('count').textContent = friends.length;
    orbitEmpty.style.display = friends.length === 0 ? 'block' : 'none';

    if (friends.length === 0) return;

    const count = friends.length;
    // 轨道半径
    const radius = Math.min(200, 80 + count * 22);

    friends.forEach((f, i) => {
        const angle = (360 / count) * i - 90; // 从顶部开始均匀分布
        const rad = angle * (Math.PI / 180);
        const x = Math.cos(rad) * radius;
        const y = Math.sin(rad) * radius;

        const item = document.createElement('div');
        item.className = 'orbit-item';
        // 放在轨道容器中心偏移
        item.style.cssText = `
            left: calc(50% + ${x}px - 40px);
            top: calc(50% + ${y}px - 40px);
            animation: fadeIn 0.4s ease ${i * 0.06}s both;
        `;

        const initial = f.name.charAt(0).toUpperCase();
        item.innerHTML = `
            <div class="fireseed">
                <div class="fireseed-glow"></div>
                <div class="fireseed-avatar">${initial}</div>
                <div class="fireseed-name">${f.name}</div>
                <div class="fireseed-delete" onclick="event.stopPropagation(); removeFriend(${i})">✕</div>
            </div>
        `;
        orbitContainer.appendChild(item);
    });
}

// ── 指令栏：回车添加好友 ──
cmdInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const name = cmdInput.value.trim();
    if (!name) return;
    if (friends.some(f => f.name === name)) {
        log(`"${name}" 已在列表中`);
        cmdInput.value = '';
        return;
    }
    friends.push({ name });
    cmdInput.value = '';
    renderOrbit();
    log(`✦ 火种已加入: ${name}`);
});

// ── 删除好友 ──
function removeFriend(index) {
    const name = friends[index].name;
    friends.splice(index, 1);
    renderOrbit();
    log(`✕ 火种已移除: ${name}`);
}

// ── 保存配置 ──
async function saveConfig() {
    const time = document.getElementById('scheduleTime').value;
    if (friends.length === 0) return log('请至少添加一个好友！');
    // TODO: 调用原有的 /api/config 接口
    await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ friends: friends, scheduleTime: time })
    });
    log(`配置已保存: ${friends.length} 位好友, 时间 ${time}`);
}

// ── 扫码登录 ──
async function runLogin() {
    log('正在启动登录窗口...');
    // TODO: 调用原有的 /api/login 接口
    const res = await fetch('/api/login', { method: 'POST' });
    log(await res.text());
}

// ── 立即群发 ──
async function runNow() {
    log('正在后台启动群发任务...');
    // TODO: 调用原有的 /api/run 接口
    const res = await fetch('/api/run', { method: 'POST' });
    if (res.ok) log('任务完成，请查看本地日志');
    else log('启动失败');
}

// ── 更新定时任务 ──
async function setSchedule() {
    await saveConfig();
    log('正在更新系统定时任务...');
    // TODO: 调用原有的 /api/schedule 接口
    const res = await fetch('/api/schedule', { method: 'POST' });
    const data = await res.json();
    log(data.msg || data.details || data.error);
}

// ── 刷新凭证 ──
async function refreshSession() {
    log('正在刷新登录凭证...');
    // TODO: 调用原有的 /api/refresh 接口
    const res = await fetch('/api/refresh', { method: 'POST' });
    const data = await res.json();
    log(data.msg);
}

// ── 初始化 ──
// TODO: 调用原有的 /api/config 接口
fetch('/api/config').then(r => r.json()).then(data => {
    if (!data.friends && data.friendName) {
        friends = [{ name: data.friendName }];
    } else {
        friends = data.friends || [];
    }
    document.getElementById('scheduleTime').value = data.scheduleTime || '08:00';
    renderOrbit();
    log('系统就绪，篝火已点燃');
});
</script>
</body>
</html>
